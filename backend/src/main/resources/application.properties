# ===============================
# 小小怪卡密验证系统 Pro - 配置文件
# ===============================

# 服务器配置
server.port=8080
server.servlet.context-path=/api

# 数据库配置
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/kami?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP 连接池配置
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.leak-detection-threshold=30000

# JPA 配置
# 安全修复：默认使用 validate 模式，防止 Hibernate 自动修改表结构
# 首次部署或需要自动建表时，通过环境变量 DDL_AUTO=update 临时开启
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT 配置（必须通过环境变量配置，无默认值）
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:3600000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# 邮件配置
spring.mail.host=${MAIL_HOST:smtp.qq.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
# SSL 和 STARTTLS 二选一：465端口用ssl，587端口用starttls
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.required=false

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JSON 配置
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.serialization.write-dates-as-timestamps=false

# 日志配置
# 认证相关事件使用 INFO 级别记录，便于安全审计
logging.level.org.xxg=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN
# 日志文件路径（Docker 部署时挂载到宿主机）
logging.file.path=${LOG_PATH:./logs}
# 使用 logback-spring.xml 进行详细配置（轮转、分离错误日志等）

# CORS 配置（逗号分隔的允许域名）
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# 应用版本和仓库地址配置（用于系统更新检查）
app.version=${APP_VERSION:1.0.2}
app.repo-url=${APP_REPO_URL:https://github.com/user/xxgkami-ai}
