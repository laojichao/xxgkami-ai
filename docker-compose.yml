# ============================================================
# 小小怪卡密验证系统 Pro - Docker Compose 配置
# 使用方法：
#   1. 复制 .env.example 为 .env 并填写配置
#   2. docker compose up -d
#   3. 访问 http://localhost:8080
# ============================================================

services:
  # ---- MySQL 数据库 ----
  db:
    image: mysql:8.0
    container_name: xxgkami-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?请在 .env 中设置 DB_PASSWORD}
      MYSQL_DATABASE: kami
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - xxgkami-net

  # ---- 后端 Spring Boot ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xxgkami-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://db:3306/kami?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:?请在 .env 中设置 DB_PASSWORD}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-5}
      DDL_AUTO: ${DDL_AUTO:-update}
      JWT_SECRET: ${JWT_SECRET:?请在 .env 中设置 JWT_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-3600000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      MAIL_HOST: ${MAIL_HOST:-smtp.qq.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SSL_ENABLE: ${MAIL_SSL_ENABLE:-true}
      MAIL_STARTTLS_ENABLE: ${MAIL_STARTTLS_ENABLE:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      RATE_LIMIT_TRUSTED_PROXIES: ${RATE_LIMIT_TRUSTED_PROXIES:-172.20.0.3,127.0.0.1}
      APP_VERSION: ${APP_VERSION:-1.0.2}
      APP_REPO_URL: ${APP_REPO_URL:-https://github.com/laojichao/xxgkami-ai}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m -XX:+UseG1GC}
    ports:
      - "8080:8080"
    volumes:
      - backup_data:/app/backups
      - log_data:/app/logs
      - frontend_dist:/app/static
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/system/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - xxgkami-net

  # ---- Nginx 反向代理（前端 + API） ----
  nginx:
    image: nginx:1.25-alpine
    container_name: xxgkami-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    networks:
      - xxgkami-net

volumes:
  mysql_data:
    driver: local
  backup_data:
    driver: local
  log_data:
    driver: local
  nginx_logs:
    driver: local
  frontend_dist:
    driver: local

networks:
  xxgkami-net:
    driver: bridge
